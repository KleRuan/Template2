<!DOCTYPE html>
<html>
  <body>
    <!-- Static skeleton so Netlify registers the form at build time. Never shown to users. -->
    <form name="delivery" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="address" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
